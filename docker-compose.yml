
services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptoai_postgres
    environment:
      POSTGRES_USER: cryptoai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cryptoai_trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptoai"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    container_name: cryptoai_postgres_test
    environment:
      POSTGRES_USER: cryptoai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cryptoai_trader_test
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: cryptoai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: cryptoai_api
    command: poetry run uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
